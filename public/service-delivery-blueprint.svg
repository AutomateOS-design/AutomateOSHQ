    <text x="440" y="38" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#2DD4BF" text-anchor="middle" font-weight="700">Build Sprint</text>
    <text x="640" y="38" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle" font-weight="600">Launch</text>
    <text x="820" y="38" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle" font-weight="600">Ong Ops</text>
