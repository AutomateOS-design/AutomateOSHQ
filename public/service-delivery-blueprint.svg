    <line x1="0" y1="52" x2="1100" y2="52" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="0" y1="105" x2="1100" y2="105" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="0" y1="157" x2="1100" y2="157" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="0" y1="210" x2="1100" y2="210" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="0" y1="262" x2="1100" y2="262" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="0" y1="315" x2="1100" y2="315" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="0" y1="367" x2="1100" y2="367" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="0" y1="420" x2="1100" y2="420" stroke="#6366F1" stroke-width="0.5"/>
    <!-- Vertical lines -->
    <line x1="0" y1="0" x2="0" y2="420" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="137" y1="0" x2="137" y2="420" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="275" y1="0" x2="275" y2="420" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="412" y1="0" x2="412" y2="420" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="550" y1="0" x2="550" y2="420" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="687" y1="0" x2="687" y2="420" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="825" y1="0" x2="825" y2="420" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="962" y1="0" x2="962" y2="420" stroke="#6366F1" stroke-width="0.5"/>
