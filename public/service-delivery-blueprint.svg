    <text x="90" y="140" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle" font-weight="500">Deploy live into your</text>
    <text x="90" y="155" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle" font-weight="500">workspaces and connect</text>
    <text x="90" y="170" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle" font-weight="500">to your tech stack</text>

