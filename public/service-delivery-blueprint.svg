    <line x1="95" y1="53" x2="100" y2="58" stroke="#818CF8" stroke-width="2.5" stroke-linecap="round"/>
    
    <text x="90" y="92" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#F1F5F9" text-anchor="middle">Audit</text>
    <text x="90" y="108" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6366F1" text-anchor="middle" font-weight="600">DIAGNOSTICS</text>
    
    <line x1="20" y1="120" x2="160" y2="120" stroke="#1E293B" stroke-width="1"/>
    
    <text x="90" y="140" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle" font-weight="500">Deep-dive into your</text>
    <text x="90" y="155" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle" font-weight="500">existing tools, manual</text>
    <text x="90" y="170" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle" font-weight="500">tasks, and bottlenecks</text>

