<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer ring / circuit path -->
  <circle cx="32" cy="32" r="30" stroke="#6366F1" stroke-width="1.5" opacity="0.15"/>

  <!-- Left leg -->
  <line x1="32" y1="56" x2="18" y2="10" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="32" y1="56" x2="46" y2="10" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
  <!-- Crossbar -->
  <line x1="22" y1="36" x2="42" y2="36" stroke="#14B8A6" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Apex node (AI center) -->
  <circle cx="32" cy="10" r="5.5" fill="url(#brandGrad)" filter="url(#glow)"/>
  <circle cx="32" cy="10" r="2" fill="white"/>

  <!-- Foot nodes -->
  <circle cx="18" cy="52" r="3" fill="#6366F1" opacity="0.8"/>
  <circle cx="46" cy="52" r="3" fill="#6366F1" opacity="0.8"/>

  <!-- Crossbar node -->
  <circle cx="32" cy="36" r="3" fill="#14B8A6" opacity="0.9"/>

  <!-- Data particles -->
  <circle cx="23" cy="22" r="1.5" fill="#818CF8" opacity="0.6"/>
  <circle cx="41" cy="22" r="1.5" fill="#14B8A6" opacity="0.6"/>
  <circle cx="23" cy="46" r="1.5" fill="#6366F1" opacity="0.5"/>
  <circle cx="41" cy="46" r="1.5" fill="#14B8A6" opacity="0.5"/>
</svg>