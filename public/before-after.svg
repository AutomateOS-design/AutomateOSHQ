<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" fill="none">
  <defs>
    <linearGradient id="beforeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEF2F2"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="afterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="arrowBetween" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="shadowLight">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="32" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#0F172A" text-anchor="middle" letter-spacing="-0.01em">Before vs. After: Your Lead-to-Invoice Pipeline</text>

  <!-- ===== BEFORE SECTION ===== -->
  <g transform="translate(20, 55)">
    <rect width="410" height="335" rx="16" fill="url(#beforeGrad)" stroke="#FECACA" stroke-width="1.5" filter="url(#shadowLight)"/>

    <!-- Before Header -->
    <rect x="0" y="0" width="410" height="48" rx="16" fill="#FEE2E2"/>
    <rect x="0" y="20" width="410" height="28" fill="#FEE2E2"/>
    <circle cx="24" cy="24" r="8" fill="#EF4444" opacity="0.2"/>
    <path d="M21 21L27 27M27 21L21 27" stroke="#EF4444" stroke-width="1.8" stroke-linecap="round"/>
    <text x="44" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#991B1B">BEFORE · Manual Process</text>

    <!-- Time wasted label -->
    <rect x="290" y="10" width="106" height="28" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
    <text x="343" y="29" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#DC2626" text-anchor="middle">~4+ HOURS PER DAY</text>

    <!-- Step 1: Check email -->
    <g transform="translate(20, 65)">
      <rect x="0" y="0" width="370" height="42" rx="10" fill="white" stroke="#F1F5F9" stroke-width="1"/>
      <circle cx="21" cy="21" r="10" fill="#FEF2F2"/>
      <text x="21" y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#DC2626" text-anchor="middle">1</text>
      <text x="44" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#475569">Check 3 different inboxes for new leads</text>
      <text x="340" y="21" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#94A3B8">20 min</text>
    </g>

    <!-- Step 2: Copy data -->
    <g transform="translate(20, 115)">
      <rect x="0" y="0" width="370" height="42" rx="10" fill="white" stroke="#F1F5F9" stroke-width="1"/>
      <circle cx="21" cy="21" r="10" fill="#FEF2F2"/>
      <text x="21" y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#DC2626" text-anchor="middle">2</text>
      <text x="44" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#475569">Copy-paste lead data into spreadsheet</text>
      <text x="340" y="21" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#94A3B8">15 min</text>
    </g>

    <!-- Step 3: Manual enrichment -->
    <g transform="translate(20, 165)">
      <rect x="0" y="0" width="370" height="42" rx="10" fill="white" stroke="#F1F5F9" stroke-width="1"/>
      <circle cx="21" cy="21" r="10" fill="#FEF2F2"/>
      <text x="21" y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#DC2626" text-anchor="middle">3</text>
      <text x="44" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#475569">Manually research and enrich lead data</text>
      <text x="340" y="21" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#94A3B8">25 min</text>
    </g>

    <!-- Step 4: Enter into CRM -->
    <g transform="translate(20, 215)">
      <rect x="0" y="0" width="370" height="42" rx="10" fill="white" stroke="#F1F5F9" stroke-width="1"/>
      <circle cx="21" cy="21" r="10" fill="#FEF2F2"/>
      <text x="21" y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#DC2626" text-anchor="middle">4</text>
      <text x="44" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#475569">Enter data into CRM (errors happen)</text>
      <text x="340" y="21" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#94A3B8">15 min</text>
    </g>

    <!-- Step 5: Notify team -->
    <g transform="translate(20, 265)">
      <rect x="0" y="0" width="370" height="42" rx="10" fill="white" stroke="#F1F5F9" stroke-width="1"/>
      <circle cx="21" cy="21" r="10" fill="#FEF2F2"/>
      <text x="21" y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#DC2626" text-anchor="middle">5</text>
      <text x="44" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#475569">Notify sales team in Slack manually</text>
      <text x="340" y="21" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#94A3B8">5 min</text>
    </g>
  </g>

  <!-- Arrow between -->
  <g transform="translate(438, 220)">
    <circle cx="12" cy="12" r="24" fill="url(#arrowBetween)" filter="url(#shadowLight)"/>
    <path d="M5 12H19M19 12L14 7M19 12L14 17" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ===== AFTER SECTION ===== -->
  <g transform="translate(470, 55)">
    <rect width="410" height="335" rx="16" fill="url(#afterGrad)" stroke="#A7F3D0" stroke-width="1.5" filter="url(#shadowLight)"/>

    <!-- After Header -->
    <rect x="0" y="0" width="410" height="48" rx="16" fill="#D1FAE5"/>
    <rect x="0" y="20" width="410" height="28" fill="#D1FAE5"/>
    <circle cx="24" cy="24" r="8" fill="#10B981" opacity="0.2"/>
    <path d="M20 24L23 27L28 21" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="44" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#065F46">AFTER · Automated Pipeline</text>

    <!-- Time saved label -->
    <rect x="272" y="10" width="124" height="28" rx="8" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <text x="334" y="29" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#059669" text-anchor="middle">~5 MINUTES TOTAL ⚡</text>

    <!-- Single flow -->
    <g transform="translate(20, 65)">
      <!-- One big highlighted box -->
      <rect x="0" y="0" width="370" height="90" rx="12" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>

      <circle cx="32" cy="24" r="14" fill="#10B981" opacity="0.15"/>
      <path d="M24 18L32 26L40 18" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

      <text x="56" y="22" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#065F46">Single Trigger: New Form Submission</text>
      <text x="56" y="42" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6EE7B7">Webhook → AI Enrichment → CRM → Slack</text>
    </g>

    <!-- Automation flow visualization -->
    <g transform="translate(30, 175)">
      <!-- Mini flow nodes -->
      <rect x="0" y="0" width="80" height="36" rx="8" fill="#6366F1" opacity="0.11"/>
      <text x="40" y="23" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#6366F1" text-anchor="middle">AI Extract</text>

      <path d="M82 18 L92 18" stroke="#6366F1" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>

      <rect x="94" y="0" width="80" height="36" rx="8" fill="#14B8A6" opacity="0.11"/>
      <text x="134" y="23" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#14B8A6" text-anchor="middle">Enrich</text>

      <path d="M176 18 L186 18" stroke="#14B8A6" stroke-width="1.5" marker-end="url(#arrowTeal)"/>

      <rect x="188" y="0" width="80" height="36" rx="8" fill="#6366F1" opacity="0.11"/>
      <text x="228" y="23" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#6366F1" text-anchor="middle">CRM Sync</text>

      <path d="M270 18 L280 18" stroke="#6366F1" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>

      <rect x="282" y="0" width="70" height="36" rx="8" fill="#F59E0B" opacity="0.11"/>
      <text x="317" y="23" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#D97706" text-anchor="middle">Alert</text>
    </g>

    <!-- Result metrics -->
    <g transform="translate(20, 240)">
      <!-- Hours saved -->
      <rect x="0" y="0" width="175" height="60" rx="12" fill="white" stroke="#A7F3D0" stroke-width="1"/>
      <text x="87" y="20" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#059669" text-anchor="middle">35+ hrs</text>
      <text x="87" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#6B7280" text-anchor="middle">recovered per week</text>
    </g>

    <g transform="translate(195, 240)">
      <!-- Revenue impact -->
      <rect x="0" y="0" width="175" height="60" rx="12" fill="white" stroke="#A7F3D0" stroke-width="1"/>
      <text x="87" y="20" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#059669" text-anchor="middle">$18K/mo</text>
      <text x="87" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#6B7280" text-anchor="middle">in recovered leads</text>
    </g>
  </g>
</svg>