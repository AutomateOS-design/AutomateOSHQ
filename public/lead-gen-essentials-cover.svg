<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1050" fill="none">
  <defs>
    <linearGradient id="coverBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="60%" stop-color="#172032"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="1050" rx="0" fill="url(#coverBg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.02">
    <line x1="0" y1="0" x2="800" y2="0" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="0" y1="450" x2="800" y2="450" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="0" y1="600" x2="800" y2="600" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="0" y1="750" x2="800" y2="750" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="0" y1="900" x2="800" y2="900" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="0" y1="1050" x2="800" y2="1050" stroke="#6366F1" stroke-width="0.5"/>
  </g>
  <!-- Decorative circuit pattern -->
  <g opacity="0.06">
    <circle cx="400" cy="200" r="180" fill="none" stroke="#6366F1" stroke-width="0.5"/>
    <circle cx="400" cy="200" r="140" fill="none" stroke="#6366F1" stroke-width="0.5"/>
    <circle cx="400" cy="200" r="100" fill="none" stroke="#6366F1" stroke-width="0.5"/>
  </g>
  <!-- Brand accent lines -->
  <rect x="200" y="80" width="400" height="3" rx="1.5" fill="url(#accentLine)" opacity="0.5"/>
  <!-- Logo -->
  <g transform="translate(340, 120)">
    <line x1="0" y1="32" x2="-12" y2="-12" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="32" x2="12" y2="-12" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
    <line x1="-6" y1="12" x2="6" y2="12" stroke="#14B8A6" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="-12" r="5" fill="url(#brandGrad)" filter="url(#glow)"/>
    <circle cx="0" cy="-12" r="2" fill="white"/>
  </g>
  <!-- Title -->
  <text x="400" y="300" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-0.02em">Lead Gen Essentials</text>
  <text x="400" y="340" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#818CF8" text-anchor="middle" letter-spacing="0.08em" font-weight="600">AUTOMATION TEMPLATE PACK</text>
  <!-- Description -->
  <text x="400" y="390" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle" font-weight="400">3 pre-built automation blueprints to capture,</text>
  <text x="400" y="410" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle" font-weight="400">qualify, and nurture leads on autopilot.</text>
  <!-- Divider -->
  <rect x="350" y="450" width="100" height="2" rx="1" fill="url(#brandGrad)"/>
  <!-- Value stats -->
  <g transform="translate(160, 490)">
    <rect x="0" y="0" width="140" height="80" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="70" y="32" font-family="Inter" font-size="28" font-weight="800" fill="#818CF8" text-anchor="middle">3</text>
    <text x="70" y="55" font-family="Inter" font-size="10" fill="#94A3B8" text-anchor="middle" font-weight="500">Ready-to-Deploy Templates</text>
  </g>
  <g transform="translate(330, 490)">
    <rect x="0" y="0" width="140" height="80" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="70" y="32" font-family="Inter" font-size="28" font-weight="800" fill="#2DD4BF" text-anchor="middle">30%</text>
    <text x="70" y="55" font-family="Inter" font-size="10" fill="#94A3B8" text-anchor="middle" font-weight="500">Higher Conversion Rate</text>
  </g>
  <g transform="translate(500, 490)">
    <rect x="0" y="0" width="140" height="80" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="70" y="32" font-family="Inter" font-size="28" font-weight="800" fill="#34D399" text-anchor="middle">&lt;60s</text>
    <text x="70" y="55" font-family="Inter" font-size="10" fill="#94A3B8" text-anchor="middle" font-weight="500">Lead Response Time</text>
  </g>
  <!-- Bottom brand -->
  <text x="400" y="620" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569" text-anchor="middle" font-weight="600" letter-spacing="0.12em">AUTOMATEOS</text>
  <text x="400" y="640" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155" text-anchor="middle" letter-spacing="0.08em">PRODUCTIZED WORKFLOW AUTOMATION</text>
  <!-- Footer accent -->
  <rect x="0" y="1040" width="800" height="10" fill="url(#brandGrad)" opacity="0.8"/>
</svg>