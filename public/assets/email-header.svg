<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="headerBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" fill="url(#headerBg)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="50" x2="600" y2="50" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="600" y2="100" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="600" y2="150" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="200" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="200" stroke="#6366F1" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="200" stroke="#6366F1" stroke-width="0.5"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="600" height="3" fill="url(#accentLine)"/>

  <!-- Logo icon -->
  <g transform="translate(32, 42)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="url(#logoGrad)" opacity="0.95"/>
    <!-- Zap icon -->
    <polygon points="24,6 14,22 20,22 16,34 28,17 21,17 25,6" fill="white" opacity="0.9"/>
  </g>

  <!-- Brand name -->
  <text x="84" y="60" font-family="'Inter',-apple-system,BlinkMacSystemFont,sans-serif" font-size="22" font-weight="800" fill="white" letter-spacing="-0.5">AutomateOS</text>
  <text x="84" y="78" font-family="'Inter',-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#6366F1" font-weight="600" letter-spacing="3">CLIENT PORTAL</text>

  <!-- Right side decorative elements -->
  <g transform="translate(500, 35)" opacity="0.15">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#6366F1" stroke-width="1"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#14B8A6" stroke-width="1"/>
    <circle cx="0" cy="0" r="10" fill="#6366F1" opacity="0.3"/>
  </g>

  <!-- Circuit trace decorative lines -->
  <g opacity="0.08" transform="translate(440, 55)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#14B8A6" stroke-width="1.5"/>
    <line x1="40" y1="0" x2="40" y2="25" stroke="#14B8A6" stroke-width="1.5"/>
    <circle cx="40" cy="25" r="2.5" fill="#14B8A6"/>
  </g>

  <!-- Tagline -->
  <text x="32" y="126" font-family="'Inter',-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#94A3B8" font-weight="500">
    Your AI-Powered Automation Operations Department
  </text>

  <!-- Trust indicators -->
  <g transform="translate(32, 150)">
    <rect x="0" y="0" width="536" height="28" rx="6" fill="#1E293B" opacity="0.6"/>
    <text x="12" y="18" font-family="'Inter',-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#64748B" font-weight="600">
      <tspan fill="#14B8A6">●</tspan>  48-hour build time  <tspan fill="#475569">|</tspan>  
      <tspan fill="#6366F1">●</tspan>  100% custom-built  <tspan fill="#475569">|</tspan>  
      <tspan fill="#10B981">●</tspan>  Unlimited revisions  <tspan fill="#475569">|</tspan>  
      <tspan fill="#F59E0B">●</tspan>  Cancel anytime
    </text>
  </g>
</svg>